name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Lint skills
        run: python3 tools/skills_release.py lint

      - name: Build zip assets
        run: python3 tools/skills_release.py build-zips --out dist --tag "${{ github.ref_name }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/*.zip \
            dist/SHA256SUMS.txt \
            --generate-notes
